<header>
    <div class="container">
        <nav id = menu class="navbar navbar-expand-lg bg-dark p-0 fixed-top bg-body-tertiary">
            <div class="container-fluid p-1 text-bg-dark">
                <a class="navbar-brand text-white" href="#">BTS SIO SLAM</a>
                <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <ul class="nav justify-content-center w-100">
                        {% for lien, titre  in MENU %}
                        <li class="nav-item">
                            <a class="nav-link active link-light p-4" aria-current="page" href="{{lien}}">{{titre}}</a>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    {% include 'presentation.html'%}
</header>

<script>
    function closeNavBar() {
        document.getElementById("navbarNav").classList = "collapse navbar-collapse justify-content-center";
    }

    const navItem = document.getElementsByClassName("nav");

    navItem[0].addEventListener("click", (event) => {
        closeNavBar();
      });
</script>
